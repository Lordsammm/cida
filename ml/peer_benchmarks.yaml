# Peer benchmark distributions for sector × region cohorts.
# Used for percentile lookup until real assessment data accumulates.
#
# Sources for seeded values:
#   [COA25]  Coalition 2025 Cyber Claims Report — SMB book claims frequency + control profiles
#   [CIS8]   CIS Controls v8 Community Defence Model — control implementation rates by sector
#   [ENISA24] ENISA Threat Landscape 2024 — sector maturity benchmarks
#   [SER25]  Serianu Africa Cybersecurity Report 2024/2025 — Africa-specific maturity data
#   [IBM24]  IBM/Ponemon Cost of a Data Breach 2024 — sector posture benchmarks
#
# Structure per cohort:
#   overall_mean:     average overall score across the cohort
#   overall_std:      standard deviation of overall scores
#   domain_means:     average domain score per domain
#
# Percentile is computed as: (score - mean) / std, mapped to normal CDF.
# "synthetic_seeded" tag is replaced with "accumulated_n=X" once real data exists.

version: "1.0"
data_source: "synthetic_seeded"

cohorts:

  # ── West Africa ────────────────────────────────────────────────────────────

  - sector: banking
    region: west_africa
    n_orgs: 0
    overall_mean: 52.0
    overall_std: 14.0
    domain_means:
      governance: 55
      identity: 48
      asset_data: 50
      network: 53
      endpoint: 47
      appsec: 45
      cloud: 38
      third_party: 42
