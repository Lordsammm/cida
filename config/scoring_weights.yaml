# CIDA Domain Weights, Severity Penalties, and Tier Bands
#
# Calibrated from 2024-2025 cyber insurance claims data and cyber threat intelligence
# across 10+ primary sources. Every weight entry cites the specific evidence.
# Update annually as new claims data emerges.
#
# PRIMARY SOURCES
# [DBIR25]     Verizon Data Breach Investigations Report 2025 (incident data through 2024)
# [DBIR24]     Verizon Data Breach Investigations Report 2024
# [COA25]      Coalition 2025 Cyber Claims Report (policyholders across the US, CA, UK)
# [IBM24]      IBM / Ponemon Cost of a Data Breach Report 2024 (604 organisations, 17 countries)
# [SOP24]      Sophos State of Ransomware 2024 (5,000 IT leaders, 14 countries)
# [MAN25]      Mandiant M-Trends 2025 (frontline IR engagements 2024 data)
# [CSK25]      CrowdStrike Global Threat Report 2025 (cloud + endpoint telemetry)
# [MRE24]      Munich Re Cyber Insurance Risks and Trends 2024
# [CVS24]      Corvus Insurance Ransomware and Cyber Threat Reports Q1-Q4 2024
# [BZY24]      Beazley Spotlight on Cyber and Technology Risk 2024
# [INT25]      Interpol African Cyberthreat Assessment Report 2025 (4th edition)
# [INT24]      Interpol African Cyberthreat Assessment Report 2024
# [SER25]      Serianu Africa Cybersecurity Report 2024/2025
# [GSMA24]     GSMA Mobile Money State of the Industry Report 2024
# [SMI24]      Smile ID State of KYC in Africa 2024
# [WEF24]      World Economic Forum Global Cybersecurity Outlook 2024


domain_weights:

  # 16% -- IDENTITY is the single highest claims predictor across every dataset reviewed.
  #
  # Claims evidence:
  #   [COA25] 60% of all 2024 claims originated from BEC and Funds Transfer Fraud,
  #           both of which are fundamentally identity / credential attacks.
  #   [DBIR25] Credentials remain the #1 action-on-objective; valid account abuse
  #            is the leading initial access vector for cloud environments.
  #   [DBIR24] Stolen credentials appear in 38% of all breaches; in Basic Web
  #            Application Attacks specifically, credentials account for 77%.
  #   [CSK25]  Valid account misuse = 35% of cloud incidents in H1 2024. 79% of
  #            attacks to gain initial access are now malware-free, meaning they
  #            rely on stolen or misused credentials rather than exploits.
  #            Access-broker advertisements (selling stolen credentials) surged 50% YoY.
  #   [MAN25]  Stolen credentials rose to the #2 initial access vector globally at 16%,
  #            the first time this vector has reached that position.
  #
  # Africa-specific:
  #   [INT25]  BEC and Funds Transfer Fraud are Africa's dominant cyber loss types.
  #            Phishing (the primary credential-harvesting technique) accounts for
  #            34% of all recorded incidents. 11 African countries concentrate most
  #            BEC activity; the financial sector is the primary target.
  #   [INT24]  Cybercrime losses >$3bn across Africa 2019-2025; BEC and FTF are
  #            the leading contributor. West Africa BEC syndicates (e.g. Black Axe)
  #            run multi-million dollar credential-based operations.
  #   [SER25]  Securing identities is highlighted as the #1 resilience priority
  #            for African organisations in 2025/2026.
  #   [CSK25]  Vishing (voice phishing) attacks surged 442% in H2 2024 vs H1 2024,
  #            with Africa's mobile-money ecosystem a primary target.
  identity: 0.16

  # 13% -- Endpoint hardening is the primary ransomware mitigation lever.
  #
  #   [SOP24]  Ransomware affected 59% of organisations surveyed. Average recovery
  #            cost excluding ransom was $2.73 million. Endpoints (servers included)
  #            are the primary destination for ransomware actors.
  #   [SOP24]  In 94% of US ransomware attacks, attackers tried to compromise backups;
  #            66% of those attempts succeeded. EDR with behavioural AI (CryptoGuard)
  #            detects and rolls back active encryption attempts in real time.
  #   [CVS24]  614 organisations were hit in 2024 after failing to address known
  #            endpoint vulnerabilities they had been warned about; collective losses
  #            estimated at $307 million.
  #   [MRE24]  Ransomware is the leading cause of cyber insurance losses globally.
  #            Manufacturing has the highest ransomware claim count by industry.
  #   [CSK25]  Adversary breakout time (time from initial access to lateral movement)
  #            fell to 48 minutes median in 2024 vs 62 minutes in 2023; endpoint
  #            detection speed is therefore increasingly critical.
  endpoint: 0.13

  # 13% -- Detection speed and IR maturity are the #1 cost driver post-breach.
  #
  #   [IBM24]  Average breach cost: $4.88M (record high). Organisations with
  #            extensive security AI and automation averaged $3.84M vs $5.72M
  #            without, a saving of $1.88M (33% cost reduction).
  #   [IBM24]  Use of AI in prevention workflows reduced average breach cost by
  #            $2.2M compared to organisations not deploying AI in prevention.
  #   [IBM24]  Organisations that found breaches with their own security teams
  #            (42% in 2024, up from 33% in 2023) had below-average breach costs.
  #   [MAN25]  Global median dwell time: 11 days overall, but only 5 days when
  #            adversaries self-disclosed (ransomware) and 10 days when the
  #            organisation detected it internally vs 26 days when notified externally.
  #            Extended dwell time directly multiplies breach cost accumulation.
  #   [COA25]  Rapid detection is the single biggest premium differentiator in
  #            Coalition's book; late-detected incidents are 4x more costly.
  detect_respond: 0.13

  # 10% -- Backup and recovery maturity is the most under-weighted domain in
  #         traditional models vs. its actual claims impact.
  #
  #   [CVS24]  Median ransomware claim cost for policyholders WITH backup strategies
  #            was 72% lower than those without. Backups allow victims to skip
  #            expensive decryption and avoid paying ransom.
  #   [SOP24]  Organisations that restored from clean backups avoided ransom payment
  #            in 42% of incidents. Average ransom paid in 2024 increased 500% YoY
  #            to $3.96M for those who paid.
  #   [SOP24]  94% of US attacks targeted backups; 66% of backup compromise attempts
  #            succeeded. Immutable backup architecture directly counters this.
  #   [MRE24]  Backup / recovery capability is cited as a primary loss-mitigation
  #            factor across Munich Re's reinsured book.
  resilience: 0.10

  # 10% -- Network perimeter exposure remains a primary initial-access vector.
  #
  #   [CVS24]  VPN vulnerabilities accounted for 28.7% of all ransomware incidents
  #            tracked in Q3 2024. VPN accounts with weak credentials and no MFA
  #            are the dominant entry point for ransomware groups.
  #   [MAN25]  Exploits are the #1 initial access vector globally at 33%, up for the
  #            fifth consecutive year. Network perimeter products (firewalls, VPNs,
  #            load balancers) are the most commonly exploited class of asset.
  #   [DBIR25] Verizon reports a 34% jump in vulnerability exploitation vs prior year,
  #            driven by exploitation of edge devices and network appliances.
  #   [CSK25]  52% of vulnerabilities observed relate to initial access; network
  #            perimeter assets represent the majority of that exposure surface.
  network: 0.10

  # 9% -- Third-party and supply-chain risk is structurally higher in Africa.
  #
  #   [WEF24]  41% of companies surveyed globally were affected by a third-party
  #            cyber incident in the prior 12 months.
  #   [DBIR24] 15% of breaches involved third-party infrastructure, partner networks,
  #            or software supply chains.
  #   [MRE24]  BEC causing $3bn in losses globally 2021-2023; supply chain attacks
  #            doubling. Munich Re expects hacks across supplier / provider networks
  #            to increase further.
  #
  # Africa-specific amplifiers:
  #   [GSMA24] Mobile money interoperability APIs (M-Pesa, MTN MoMo, Orange Money)
  #            create a dense, expanding API attack surface across sub-Saharan Africa.
  #            A single compromised switch-provider can expose millions of accounts.
  #   [SMI24]  KYC and identity-verification API dependencies expose African fintechs
  #            to supply-chain compromise; single points of failure in the identity
  #            stack are a growing loss vector.
  #   [SER25]  Strengthening third-party ecosystems listed as a 2025/2026 Africa
  #            resilience priority alongside identity and detection.
  third_party: 0.09

  # 8% -- Governance shapes program maturity but is an indirect claims driver.
  #
  #   [BZY24]  75% of global executives believe they are prepared for cyber risk,
  #            but Beazley's claims data shows systemic over-confidence. Governance
  #            failures (no CISO, no board oversight, no annual testing) correlate
  #            with higher claims frequency but are hard to isolate as direct cause.
  #   [IBM24]  Security staffing shortages were associated with $1.76M higher breach
  #            costs, reflecting the governance-to-capability link.
  #   Regulatory mandates (CBN 2024, FSCA Joint Standard 2 2024, SARB Directive
  #   01/2024, CBE Financial Cybersecurity Framework) all require documented
  #   governance frameworks, elevating governance from optional to compliance-mandatory
  #   across Nigeria, South Africa, and Egypt.
  governance: 0.08

  # 8% -- Asset and data management is foundational but operates as an indirect driver.
  #
  #   [CSK25]  52% of vulnerabilities linked to initial access require asset visibility
  #            to detect and remediate before exploitation. Organisations cannot patch
  #            what they do not know they own.
  #   [DBIR25] Vulnerability exploitation up 34% YoY; unknown / unmanaged assets are
  #            the primary reason known CVEs remain unpatched at the time of breach.
  #   [MAN25]  34% of initial infection vectors in 2024 were unknown, partly attributable
  #            to unmanaged assets and shadow IT outside the known perimeter.
  asset_data: 0.08

  # 7% -- Application security matters but has a lower profile in Africa's threat mix.
  #
  #   [MAN25]  Exploits = 33% of initial access globally, with web application
  #            vulnerabilities a key subset. Email phishing fell from 22% to 14%
  #            initial access share, but exploit-based entry grew.
  #   [DBIR24] Basic Web Application Attacks pattern is the third most common;
  #            however, most access is credential-based rather than code-exploit.
  #   Africa context: credential and social-engineering attacks dominate over
  #   sophisticated web-app exploitation in the current Africa threat profile,
  #   consistent with [INT25] and [SER25] findings. Weight will increase as
  #   African digital services mature and attract more sophisticated adversaries.
  appsec: 0.07

  # 6% -- Cloud misconfiguration is growing but Africa has lower cloud penetration.
  #
  #   [CSK25]  Valid account misuse = 35% of cloud incidents globally in H1 2024
  #            (captured under IDENTITY weight above; cloud-specific misconfig is separate).
  #   [IBM24]  AI and automation are most impactful in cloud-heavy environments.
  #   Africa context: cloud adoption is accelerating but remains below global averages;
  #   the weight is set lower than the global benchmark and should be reviewed upward
  #   as hyperscaler penetration increases across financial services.
  #   [SER25]  Cloud security gaps are flagged as an emerging concern but not yet
  #            the primary African loss vector.
  cloud: 0.06


# Penalty points deducted from a domain score per technical finding.
# Calibrated so a single Critical finding reduces a domain score by ~8 points
# (approximately one control-maturity tier), reflecting real-world risk impact.
#
# [WEF24] / [IBM24]: CVSS 9-10 vulnerabilities are associated with 6x higher breach
# probability vs CVSS < 4 findings in the same environment.
# [CVS24]: Organisations that ignored prior scanner warnings (pre-breach) suffered
# an estimated $307M in collective losses across 614 incidents in 2024.
severity_penalties:
  critical: 8.0
  high: 3.5
  medium: 1.0
  low: 0.25
  info: 0.0

# Additional flat penalty for findings on CISA's Known Exploited Vulnerability (KEV) list.
# [CVS24] / [CSK25]: KEV-listed vulnerabilities in internet-exposed assets are the
# strongest single predictor of a near-term breach event. The 6-point penalty reflects
# the active exploitation status versus a theoretical CVSS score alone.
kev_penalty: 6.0

# Maximum total technical penalty that can be applied to a single domain.
# Prevents one noisy scanner run from collapsing a domain score to zero
# when the questionnaire responses indicate mature controls.
max_domain_tech_penalty: 35.0


# Tier assignment bands (score thresholds, inclusive lower bound).
# Tier 1 = best risk (preferred), Tier 5 = worst risk (declination / conditional cover).
# Bands are calibrated against the 10 backtest reference cases spanning a realistic
# range of African portfolio risks from Tier 1 mature banks to Tier 5 SMEs.
tier_bands:
  - threshold: 85
    tier: 1
    label: Excellent
    description: "Mature program; preferred risk"
  - threshold: 70
    tier: 2
    label: Good
    description: "Strong program with minor gaps; standard terms"
  - threshold: 55
    tier: 3
    label: Adequate
    description: "Acceptable risk with required remediations"
  - threshold: 40
    tier: 4
    label: Below Standard
    description: "Material gaps; restricted terms or sub-limits required"
  - threshold: 0
    tier: 5
    label: High Risk
    description: "Significant deficiencies; declination or conditional cover"
