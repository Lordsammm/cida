id: ccpa
name: California Consumer Privacy Act (CCPA) and CPRA
version: "CCPA 2018 / CPRA amendments effective January 2023"
jurisdiction: US-CA
applies_to:
  sectors: [banking, insurance, fintech, healthcare, telecom, education, other]
  countries: []
  trigger: "Organisations that collect personal information of California residents AND meet one of: annual revenue > $25M; buy/sell/receive personal data of 100,000+ consumers/households; derive 50%+ of annual revenue from selling personal data"
regulator: CPPA
key_requirements:
  - "Consumer rights: know, delete, correct, opt-out of sale, limit use of sensitive personal information, non-discrimination"
  - "Privacy notice at collection"
  - "Privacy policy with comprehensive disclosures"
  - "Reasonable security measures (implied by private right of action for security breaches)"
  - "Data minimisation and purpose limitation (CPRA)"
  - "Sensitive personal information limits (CPRA)"
  - "Annual risk assessments for high-risk activities (CPRA)"
  - "Contractor and service provider agreements"
penalties:
  max_fine_usd: 7500
  notes: "Up to $7,500 per intentional violation; $2,500 per unintentional violation. Private right of action for security breaches: $100-$750 per consumer per incident. CPPA can impose civil penalties."
cyber_crosswalk:
  security_measures: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
  breach_notification: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
  data_minimisation: { nist_csf_2_0: [ID.AM-01, ID.AM-02, PR.DS-01], iso_27001_2022: [A.5.9, A.5.12] }
notes: "Applicable to African organisations that collect California resident data (e.g. diaspora-facing services, US-listed companies). CCPA is not an African regulation but affects African carriers with California data subjects."
source: "https://oag.ca.gov/privacy/ccpa"
