id: CBN
name: Central Bank of Nigeria
type: financial
scope: national
country: NG
website: https://www.cbn.gov.ng
directives:
  - id: CBN-RBCSF-2024
    name: Risk-Based Cybersecurity Framework and Guidelines for Deposit Money Banks and Payment Service Banks
    enacted: "2024-05-31"
    effective: "2024-07-01"
    notes: "Applies to Commercial banks, Merchant banks, Non-Interest banks, and Payment Service Banks (Supervised Financial Institutions). Supersedes the 2018 framework. Annual risk assessments mandatory; triggered again on major technology changes."
    cyber_relevant_sections:
      - section: Cybersecurity Governance and Oversight
        crosswalk: { nist_csf_2_0: [GV.OC-01, GV.RM-01, GV.SF-01, GV.RR-01], iso_27001_2022: [A.5.1, A.5.2, A.5.3] }
      - section: Cyber Risk Management
        crosswalk: { nist_csf_2_0: [ID.RA-01, ID.RA-04, ID.RA-05], iso_27001_2022: [A.5.7], cis_v8: ["17.1"] }
      - section: Third-Party Risk Management
        crosswalk: { nist_csf_2_0: [GV.SC-01, GV.SC-03, GV.SC-07], iso_27001_2022: [A.5.19, A.5.20, A.5.21] }
      - section: Vulnerability Management
        crosswalk: { nist_csf_2_0: [ID.RA-01, ID.RA-05, DE.CM-01], iso_27001_2022: [A.8.8], cis_v8: ["7.1", "7.4"] }
      - section: Emerging Technologies (AI, ML, Cloud, DLT)
        crosswalk: { nist_csf_2_0: [ID.RA-03, PR.PS-06], iso_27001_2022: [A.8.25, A.8.30] }
      - section: Cyber Resilience
        crosswalk: { nist_csf_2_0: [PR.AA-01, PR.AA-05, DE.CM-01, RC.RP-01], iso_27001_2022: [A.8.5, A.8.16, A.5.29], cis_v8: ["6.3", "6.5", "13.1"] }
      - section: Incident Management and Reporting
        crosswalk: { nist_csf_2_0: [RS.MA-01, RS.MA-02, RS.CO-02], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 24
