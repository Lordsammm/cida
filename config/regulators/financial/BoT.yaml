# Bank of Tanzania
id: BoT
name: Bank of Tanzania
type: financial
scope: national
country: TZ
website: https://www.bot.go.tz
directives:
  - id: BoT-Cybersecurity-Directive-2023
    name: Bank of Tanzania Cybersecurity Directive for Financial Institutions 2023
    enacted: 2023-01-01
    notes: "Requires licensed banks and payment system providers to implement cybersecurity frameworks, conduct annual risk assessments, and maintain incident response plans. Part of Tanzania's broader digital financial services expansion."
    cyber_relevant_sections:
      - section: Cybersecurity risk management
        crosswalk: { nist_csf_2_0: [GV.RM-01, ID.RA-01, ID.RA-04], iso_27001_2022: [A.5.7, A.8.8] }
      - section: Access controls and authentication
        crosswalk: { nist_csf_2_0: [PR.AA-01, PR.AA-05], iso_27001_2022: [A.8.2, A.8.5] }
      - section: Cyber incident notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24] }
reporting_requirements:
  incident_notification_window_hours: 24
