id: APDCP-CM
name: Autorite de Protection des Donnees a Caractere Personnel
type: data_protection
scope: national
country: CM
website: https://www.cpdp.cm
dpa_operational: false
directives:
  - id: APDCP-CM-Law
    name: "Law No. 2024/017 of 23 December 2024 on Personal Data Protection (compliance deadline June 2026)"
    enacted: "2024-12-23"
    notes: "Notify authority immediately upon awareness. DPA not yet formally established; to be created. Processors must notify authority directly (unusual internationally)."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 24
