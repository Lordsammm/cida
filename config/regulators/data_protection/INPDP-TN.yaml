# Data protection regulator - Tunisia
id: INPDP-TN
name: Instance Nationale de Protection des Données Personnelles
type: data_protection
scope: national
country: TN
website: https://www.inpdp.nat.tn
established: 2004
directives:
  - id: Organic-Law-2004-63
    name: Organic Law No. 2004-63 on the Protection of Personal Data
    enacted: 2004-07-27
    notes: "One of Africa's oldest data protection laws. INPDP is an independent authority with powers to investigate, issue opinions, and impose sanctions. Mandatory registration of processing operations."
    cyber_relevant_sections:
      - section: Security measures for personal data processing
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Data breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 48
