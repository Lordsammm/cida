id: APD-AO
name: Agencia de Protecao de Dados (Angola Data Protection Agency)
type: data_protection
scope: national
country: AO
website: https://www.apd.gov.ao
established: 2011
directives:
  - id: AO-Law-22-11-2011
    name: Law No. 22/11 on Personal Data Protection
    enacted: "2011-07-17"
    notes: "One of sub-Saharan Africa's earlier data protection laws. Enforced by the APD. APD Directive 02/APD/2024 requires immediate breach notification. Angola National Cybersecurity Strategy gazetted late 2025 designates APD as supervisory authority for data protection."
    cyber_relevant_sections:
      - section: Security of personal data processing
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification to APD
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 24
