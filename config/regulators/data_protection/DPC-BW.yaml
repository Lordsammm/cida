id: DPC-BW
name: Office of the Data Protection Commissioner
type: data_protection
scope: national
country: BW
website: https://www.bocra.org.bw
directives:
  - id: DPC-BW-Law
    name: "Data Protection Act No. 18 of 2024 (in force January 2025)"
    enacted: "2025-01-14"
    notes: "72-hour notification to Commissioner. Affected individuals notified without undue delay. Max fine: BWP 50,000,000 or 4% of global turnover."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
