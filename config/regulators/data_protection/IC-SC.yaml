id: IC-SC
name: Information Commission of Seychelles
type: data_protection
scope: national
country: SC
website: https://www.ic.sc
directives:
  - id: IC-SC-Law
    name: "Data Protection Act 2023 No. 24 (in force December 2023; 18-month compliance transition to June 2025)"
    enacted: "2023-12-22"
    notes: "72-hour notification to Information Commission (extension possible with explanation). Prompt notification to data subjects if significant number affected."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
