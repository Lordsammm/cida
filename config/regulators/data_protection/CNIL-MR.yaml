id: CNIL-MR
name: Commission Nationale de l Informatique et des Libertes
type: data_protection
scope: national
country: MR
website: https://www.cnil.mr
directives:
  - id: CNIL-MR-Law
    name: "Law No. 2018-014 on Personal Data Protection"
    enacted: "2018-01-01"
    notes: "Notify CNIL and affected individuals promptly. No specific hour deadline published. Limited operational capacity."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
