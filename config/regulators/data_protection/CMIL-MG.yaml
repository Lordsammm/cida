id: CMIL-MG
name: Commission Malagasy sur l Informatique et des Libertes
type: data_protection
scope: national
country: MG
website: https://www.cmil.mg
dpa_operational: false
directives:
  - id: CMIL-MG-Law
    name: "Law No. 2014-038 on Personal Data Protection"
