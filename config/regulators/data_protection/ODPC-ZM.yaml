id: ODPC-ZM
name: Office of the Data Protection Commissioner
type: data_protection
scope: national
country: ZM
website: https://www.odpc.gov.zm
directives:
  - id: ODPC-ZM-Law
    name: "Data Protection Act No. 3 of 2021 (enforcement commenced March 2025)"
    enacted: "2021-01-01"
    notes: "24-hour notification to Commissioner. Corporate fine: up to 100,000,000 penalty units or 2% of annual turnover."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 24
