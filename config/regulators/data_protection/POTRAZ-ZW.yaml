id: POTRAZ-ZW
name: Postal and Telecommunications Regulatory Authority of Zimbabwe
type: data_protection
scope: national
country: ZW
website: https://www.potraz.gov.zw
directives:
  - id: POTRAZ-ZW-Law
    name: "Cyber and Data Protection Act 2021 (Chapter 12:07); SI 155 of 2024 in force September 2024"
    enacted: "2021-12-03"
    notes: "24-hour notification to POTRAZ; 72-hour notification to affected individuals for high-risk breaches (two-tier system under SI 155/2024). Max penalty: Level 11 fine and/or 7 years imprisonment."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 24
