id: APDP-CI
name: Autorite de Protection des Donnees a Caractere Personnel (ARTCI)
type: data_protection
scope: national
country: CI
website: https://www.artci.ci
directives:
  - id: APDP-CI-Law
    name: "Law No. 2013-450 on Personal Data Protection"
    enacted: "2013-01-01"
    notes: "No mandatory numeric deadline - notify without delay. ARTCI acts as supervisory authority. Max fine: XOF 500,000,000 or 5% of pre-tax annual turnover."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
