id: CNPD-CV
name: Comissao Nacional de Protecao de Dados Pessoais
type: data_protection
scope: national
country: CV
website: https://www.cnpd.cv
directives:
  - id: CNPD-CV-Law
    name: "Law No. 133-V-2001 as amended by Law No. 121/IX/2021 on Personal Data Protection"
    enacted: "2021-03-17"
    notes: "72-hour notification to CNPD plus data subject notification for high-risk breaches. Max fine: CVE 300,000,000 (approx EUR 2.7M)."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
