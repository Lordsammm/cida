# Data protection regulators
id: NDPC
name: Nigeria Data Protection Commission
type: data_protection
scope: national
country: NG
website: https://ndpc.gov.ng
directives:
  - id: NDPA-2023
    name: Nigeria Data Protection Act 2023
    enacted: 2023-06-12
    cyber_relevant_sections:
