id: CIL-BF
name: Commission de l Informatique et des Libertes
type: data_protection
scope: national
country: BF
website: https://www.cil.bf
directives:
  - id: CIL-BF-Law
    name: "Law No. 010-2004/AN on Personal Data Protection"
    enacted: "2004-01-01"
    notes: "First francophone sub-Saharan Africa DPA (operational since 2007). No mandatory breach notification deadline in the general law."
    cyber_relevant_sections:
      - section: Security of personal data
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
