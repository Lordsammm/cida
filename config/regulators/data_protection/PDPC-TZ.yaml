# Data protection regulator - Tanzania
id: PDPC-TZ
name: Personal Data Protection Commission
type: data_protection
scope: national
country: TZ
website: https://www.pdpc.go.tz
established: 2024
directives:
  - id: PDPA-TZ-2022
    name: Personal Data Protection Act 2022
    enacted: 2022-11-01
    notes: "PDPC officially launched 2024. Significant GDPR-influenced framework. Mandatory data protection impact assessments for high-risk processing. Local data residency requirements for certain categories."
    cyber_relevant_sections:
      - section: Technical and organisational security measures
        crosswalk: { nist_csf_2_0: [PR.DS-01, PR.DS-02, PR.AA-01], iso_27001_2022: [A.5.34, A.8.24] }
      - section: Breach notification obligations
        crosswalk: { nist_csf_2_0: [RS.CO-02, RS.CO-03], iso_27001_2022: [A.5.24, A.5.26] }
reporting_requirements:
  incident_notification_window_hours: 72
