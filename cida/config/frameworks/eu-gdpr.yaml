id: eu-gdpr
name: EU General Data Protection Regulation (GDPR) - Regulation (EU) 2016/679
publisher: European Data Protection Board (EDPB)
year: 2018   # enforcement date
jurisdiction: European Union (extraterritorial - applies to any org processing EU resident data)
url: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:02016R0679-20160504
applies_to:
  - Any organisation that offers goods or services to EU residents
  - Any organisation that monitors the behaviour of EU residents
  - African organisations (banks, fintechs, insurers) with EU customers, investors, or data flows

# Core GDPR principles (Art. 5) that CIDA controls map to:
principles:
  - id: Art5-1a
    name: Lawfulness, fairness and transparency
    domain: governance
  - id: Art5-1b
    name: Purpose limitation
    domain: governance
  - id: Art5-1c
    name: Data minimisation
    domain: asset_data
  - id: Art5-1d
    name: Accuracy
    domain: asset_data
  - id: Art5-1e
    name: Storage limitation
    domain: asset_data
  - id: Art5-1f
    name: Integrity and confidentiality
    domain: asset_data

# Key articles driving technical security obligations:
articles:
  - id: Art25
    name: Data Protection by Design and by Default
    domain: governance
    summary: >
      Privacy must be embedded into system design from the outset.
      Default settings must be the most privacy-protective option.

  - id: Art32
    name: Security of Processing
    domain: governance
    summary: >
      Implement appropriate technical and organisational measures:
      pseudonymisation, encryption, ongoing confidentiality/integrity/availability/resilience,
      ability to restore availability, regular testing and evaluation.
    required_measures:
      - Pseudonymisation and encryption of personal data
      - Ongoing confidentiality, integrity, availability and resilience of systems
      - Ability to restore availability after physical or technical incident
      - Regular testing, assessing, and evaluating security measures

  - id: Art33
    name: Notification of personal data breach to supervisory authority
    domain: detect_respond
    summary: >
      Notify supervisory authority within 72 hours of becoming aware of a breach,
      unless it is unlikely to result in a risk to individuals' rights.

  - id: Art34
    name: Communication of personal data breach to data subject
    domain: detect_respond
    summary: Notify affected individuals without undue delay when breach is high risk.

  - id: Art35
    name: Data Protection Impact Assessment (DPIA)
    domain: governance
    summary: >
      Required before high-risk processing, including systematic profiling,
      large-scale processing of special categories of data, or systematic monitoring
      of publicly accessible areas.

  - id: Art37
    name: Designation of Data Protection Officer (DPO)
    domain: governance
    summary: >
      Mandatory for public authorities, organisations with large-scale systematic
      monitoring, or processing of special categories of data at scale.

  - id: Art44-49
    name: International transfers
    domain: governance
    summary: >
      Transfers to non-adequate third countries require appropriate safeguards
      (standard contractual clauses, binding corporate rules, etc.).

# Penalty tiers:
penalties:
  tier1:
    description: Less severe infringements (Art. 83(4))
    max_eur: 10000000
    or_pct_global_turnover: 2
    examples: [Art25, Art32, Art33, Art34, Art35, Art37, Art44]
  tier2:
    description: More severe infringements (Art. 83(5))
    max_eur: 20000000
    or_pct_global_turnover: 4
    examples: [Art5_principles, Art6_lawful_basis, Art7_consent, Art9_special_categories]
  note: "Whichever is higher - the fixed EUR amount or the % of global annual turnover."

# Key regulators African orgs may deal with:
relevant_supervisory_authorities:
  - CNIL (France)
  - BfDI (Germany)
  - ICO (UK - UK GDPR post-Brexit)
  - Irish DPC (for orgs with EU establishment in Ireland)

risk_to_loss_drivers:
  - regulatory_penalties
  - privacy_liability

sector_applicability: all
country_codes: []   # Extraterritorial; applies wherever EU resident data is processed
cida_framework_key: gdpr
