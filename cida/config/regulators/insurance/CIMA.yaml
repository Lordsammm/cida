id: CIMA
name: Conférence Interafricaine des Marchés d'Assurances
type: insurance
scope: supranational
member_countries: [BJ, BF, CM, CF, TD, KM, CG, CI, GQ, GA, GW, ML, NE, SN, TG]
website: https://cima-afrique.org
established: 1995
note: "Single supranational insurance regulator for 14 West/Central African francophone states. A single accession aligns CIDA with 14 country markets."

