# ============================================================================
# CIDA - Threat Vector x Loss Driver Matrix
#
# Each vector is scored 0..100 (0 = best, 100 = worst exposure) from a blend
# of findings + control responses. For each (vector, driver) cell below, the
# value is the FREQUENCY MULTIPLIER applied to the loss-driver's lambda when
# the vector is fully saturated (score = 100). At score = 0 the multiplier is
# 1.0 (neutral). Linear interpolation in between:
#
#     mult = 1.0 + (vector_score / 100) * (matrix_value - 1.0)
#
# Combined multiplier on a driver = product of (vector -> driver) multipliers
# across all 14 vectors. Capped per-driver at 6.0x in the actuarial model.
#
# SOURCES (mapping logic & per-cell calibration):
#   - Verizon DBIR 2024 - breach pattern x action mapping (Tables 3-4)
#   - Coalition 2024 Cyber Claims Report - initial access vector breakdown
#   - IBM Cost of a Data Breach 2024 - initial-attack-vector cost analysis
#   - Mandiant M-Trends 2024 - initial-compromise vector frequencies
#   - CrowdStrike Global Threat Report 2024 - TTP frequency tables
#   - MITRE ATT&CK technique catalog (mapping) v15
#   - FIRST EPSS model documentation
#   - CISA KEV catalog (exploit prevalence)
#   - FBI IC3 BEC investigations 2024 - DMARC/SPF correlation
#   - ENISA Threat Landscape 2024
#   - Sophos State of Ransomware 2024 - entry-point analysis
#   - Cyentia IRIS 2022 - multi-driver event correlation
#   - GSMA / Mastercard Africa fraud reports - mobile_agent_network -> computer_fraud
#   - Dragos Year in Review 2024 - OT exposure to BI
#
# CONFIDENCE TIERS:
#   high   = scored mostly from hard telemetry (CVE scans, CSPM, dark-web)
#   medium = telemetry + self-attestation blend
#   low    = questionnaire / self-attestation only
# ============================================================================

# Vector metadata - UI labels, confidence tier (telemetry availability),
# and which loss drivers they primarily influence.
vector_metadata:
  external_network_exposure:
    label: "External Network Exposure"
    confidence: high
    description: "Internet-exposed services (RDP/SMB/Telnet/databases), open admin panels, expired TLS, weak ciphers."
    primary_telemetry: ["shodan", "censys", "amass", "attack_surface"]
  unpatched_vulnerabilities:
    label: "Unpatched Vulnerabilities"
    confidence: high
    description: "Open CVEs on internet-facing assets weighted by CVSS, KEV listing, EPSS, and age."
    primary_telemetry: ["nessus", "burp", "qualys", "vapt_pdf"]
  web_application_weaknesses:
    label: "Web Application Weaknesses"
    confidence: high
    description: "OWASP Top 10: SQLi, XSS, SSRF, IDOR, broken auth, missing security headers."
    primary_telemetry: ["burp", "zap", "vapt_pdf", "appsec"]
  email_hygiene:
    label: "Email & Phishing Hygiene"
    confidence: high
    description: "SPF, DKIM, DMARC enforcement; lookalike domains; staff phishing failure rate."
    primary_telemetry: ["dmarc", "spf", "dns"]
  identity_and_access:
    label: "Identity & Access"
    confidence: medium
    description: "MFA coverage, SSO, dormant/privileged accounts, password policy, conditional access."
    primary_telemetry: ["questionnaire", "idp_export"]
  endpoint_security:
    label: "Endpoint Security"
    confidence: medium
    description: "EDR coverage, OS patching SLA, removable-media policy."
    primary_telemetry: ["questionnaire", "edr_export"]
  cloud_misconfiguration:
    label: "Cloud Misconfiguration"
    confidence: high
    description: "Public buckets, over-permissive IAM, root MFA off, logging gaps, unencrypted volumes."
    primary_telemetry: ["prowler", "securityhub", "defender", "scc", "cspm_aws", "cspm_azure", "cspm_gcp"]
  data_protection:
    label: "Data Protection"
    confidence: medium
    description: "Encryption at rest/in transit, DLP, backup completeness, immutable/air-gapped backups."
    primary_telemetry: ["questionnaire", "cspm"]
  third_party_supply_chain:
    label: "Third-Party / Supply Chain"
    confidence: medium
    description: "Vendor MFA, SBOM hygiene, dependency CVEs (Log4j-class), API-key leakage."
    primary_telemetry: ["questionnaire", "sbom"]
  detection_and_response:
    label: "Detection & Response"
    confidence: low
    description: "SIEM coverage, MTTD/MTTR, IR playbook, IR retainer, tabletop frequency."
    primary_telemetry: ["questionnaire"]
  credential_secrets_exposure:
    label: "Credential & Secrets Exposure"
    confidence: high
    description: "Leaked credentials, stealer-log infections, secrets in public repos."
    primary_telemetry: ["darkweb_credentials", "darkweb_stealer"]
  ddos_resilience:
    label: "DDoS Resilience"
    confidence: low
    description: "CDN / WAF coverage, BGP hygiene, anti-DDoS provider."
    primary_telemetry: ["questionnaire", "dns"]
  insider_risk:
    label: "Insider Risk"
    confidence: low
    description: "JML controls, UEBA, separation of duties, privileged-user monitoring."
    primary_telemetry: ["questionnaire"]
  mobile_agent_network:
    label: "Mobile / Agent Network"
    confidence: low
    description: "SIM-swap controls, agent fraud monitoring, USSD encryption (Africa-specific)."
    primary_telemetry: ["questionnaire"]

