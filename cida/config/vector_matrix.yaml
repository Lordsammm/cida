# Maximum combined product across all 14 vectors per driver. Prevents
# multiplicative explosion when many vectors are partially deficient.
per_driver_cap: 6.0

# Peer baseline: average vector score across the underwriter's book.
# A typical org with moderate gaps lands ~40 out of 100 across vectors.
# Used to compute likelihood multiplier vs peer.
peer_baseline_vector_score: 40.0
